name: Build Friend Tracker APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/misc/friend-tracker/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - uses: actions/setup-node@v4
        with:
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Ensure EAS project is linked
        working-directory: apps/mobile/misc/friend-tracker
        run: |
          if ! grep -q '"projectId"' app.json 2>/dev/null; then
            eas init --non-interactive --force
          fi

      - name: Build APK via EAS
        working-directory: apps/mobile/misc/friend-tracker
        run: |
          BUILD_JSON=$(eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --json)
          BUILD_URL=$(echo "$BUILD_JSON" | jq -r 'if type == "array" then .[0] else . end | .artifacts.buildUrl')
          curl -fsSL "$BUILD_URL" -o /tmp/friend-tracker.apk

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete friend-tracker-latest --yes 2>/dev/null || true
          git push origin :refs/tags/friend-tracker-latest 2>/dev/null || true
          gh release create friend-tracker-latest /tmp/friend-tracker.apk \
            --title "Friend Tracker – Latest Build" \
            --notes "**Install:** download the APK, open it on your Android device (you may need Settings → Install unknown apps enabled for your browser)." \
            --prerelease
