name: Manual Deploy
on:
  workflow_dispatch:
    inputs:
      app_path:
        description: 'Path to app (e.g., marketing/blog) or type "all" to deploy all apps'
        required: true
      deploy_all:
        description: 'Deploy all apps'
        type: boolean
        required: false
        default: false
      environment:
        description: 'Target Environment'
        type: choice
        required: true
        options:
          - staging
          - production
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }} 
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and deploy single app
        if: ${{ github.event.inputs.deploy_all != 'true' && github.event.inputs.app_path != 'all' }}
        run: |
          TEAM_NAME=$(echo "${{ github.event.inputs.app_path }}" | cut -d'/' -f1)
          APP_NAME=$(echo "${{ github.event.inputs.app_path }}" | cut -d'/' -f2)
          DEPLOY_ID="${TEAM_NAME}/${APP_NAME}"
          NEXT_PUBLIC_BASE_PATH="/$DEPLOY_ID" pnpm --filter "./apps/${{ github.event.inputs.app_path }}" build

          R2_ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          DEST="s3://${{ secrets.R2_BUCKET_NAME }}/${{ github.event.inputs.environment }}/${DEPLOY_ID}/"

          aws s3 sync "apps/${{ github.event.inputs.app_path }}/out" "$DEST" \
            --endpoint-url "$R2_ENDPOINT" \
            --region auto
      - name: Build and deploy all apps
        if: ${{ github.event.inputs.deploy_all == 'true' || github.event.inputs.app_path == 'all' }}
        run: |
          R2_ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"

          # Find all apps in the apps directory
          for APP_DIR in apps/*/*/; do
            if [ -d "$APP_DIR" ]; then
              # Extract team and app name from path (e.g., apps/core/home/)
              RELATIVE_PATH="${APP_DIR#apps/}"
              TEAM_NAME=$(echo "$RELATIVE_PATH" | cut -d'/' -f1)
              APP_NAME=$(echo "$RELATIVE_PATH" | cut -d'/' -f2)
              DEPLOY_ID="${TEAM_NAME}/${APP_NAME}"

              echo "Building and deploying $DEPLOY_ID..."

              # Build the app
              NEXT_PUBLIC_BASE_PATH="/$DEPLOY_ID" pnpm --filter "./apps/${TEAM_NAME}/${APP_NAME}" build

              # Sync to R2
              DEST="s3://${{ secrets.R2_BUCKET_NAME }}/${{ github.event.inputs.environment }}/${DEPLOY_ID}/"
              aws s3 sync "apps/${TEAM_NAME}/${APP_NAME}/out" "$DEST" \
                --endpoint-url "$R2_ENDPOINT" \
                --region auto

              echo "✓ Deployed $DEPLOY_ID"
            fi
          done

          echo "All apps deployed successfully!"
